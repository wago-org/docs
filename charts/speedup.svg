<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="470" viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  .title { font: bold 20px sans-serif; fill: #1f2937; }
  .axis-label { font: 14px sans-serif; fill: #374151; }
  .tick { font: 12px sans-serif; fill: #6b7280; }
  .grid { stroke: #e5e7eb; stroke-dasharray: 3,3; }
  .parity { stroke: #475569; stroke-width: 1.5; stroke-dasharray: 5,4; }
  .axis { stroke: #9ca3af; stroke-width: 1.5; }
  .bar-label { font: bold 11px sans-serif; fill: #374151; text-anchor: middle; }
  .legend-text { font: 13px sans-serif; fill: #374151; }
</style></defs>
<rect width="900" height="470" fill="#fff"/>
<text x="450" y="34" text-anchor="middle" class="title">wago speedup vs wazero  (higher = wago faster, log scale)</text>
<line x1="70.0" y1="400.0" x2="860.0" y2="400.0" class="grid"/>
<text x="60.0" y="404.0" text-anchor="end" class="tick">0.5×</text>
<line x1="70.0" y1="346.5" x2="860.0" y2="346.5" class="parity"/>
<text x="60.0" y="350.5" text-anchor="end" class="tick">1×</text>
<line x1="70.0" y1="292.9" x2="860.0" y2="292.9" class="grid"/>
<text x="60.0" y="296.9" text-anchor="end" class="tick">2×</text>
<line x1="70.0" y1="222.1" x2="860.0" y2="222.1" class="grid"/>
<text x="60.0" y="226.1" text-anchor="end" class="tick">5×</text>
<line x1="70.0" y1="168.6" x2="860.0" y2="168.6" class="grid"/>
<text x="60.0" y="172.6" text-anchor="end" class="tick">10×</text>
<line x1="70.0" y1="115.0" x2="860.0" y2="115.0" class="grid"/>
<text x="60.0" y="119.0" text-anchor="end" class="tick">20×</text>
<rect x="109.5" y="90.3" width="79.0" height="309.7" fill="#10b981" rx="4"/>
<text x="149.0" y="83.3" text-anchor="middle" class="bar-label">27.6×</text>
<text x="149.0" y="422.0" text-anchor="middle" class="tick">compile</text>
<rect x="267.5" y="383.7" width="79.0" height="16.3" fill="#ef4444" rx="4"/>
<text x="307.0" y="376.7" text-anchor="middle" class="bar-label">0.6×</text>
<text x="307.0" y="422.0" text-anchor="middle" class="tick">instantiate</text>
<rect x="425.5" y="263.1" width="79.0" height="136.9" fill="#10b981" rx="4"/>
<text x="465.0" y="256.1" text-anchor="middle" class="bar-label">2.9×</text>
<text x="465.0" y="422.0" text-anchor="middle" class="tick">call overhead</text>
<rect x="583.5" y="328.0" width="79.0" height="72.0" fill="#10b981" rx="4"/>
<text x="623.0" y="321.0" text-anchor="middle" class="bar-label">1.3×</text>
<text x="623.0" y="422.0" text-anchor="middle" class="tick">fib loop</text>
<rect x="741.5" y="369.8" width="79.0" height="30.2" fill="#ef4444" rx="4"/>
<text x="781.0" y="362.8" text-anchor="middle" class="bar-label">0.7×</text>
<text x="781.0" y="422.0" text-anchor="middle" class="tick">fib recursion</text>
<line x1="70.0" y1="70.0" x2="70.0" y2="400.0" class="axis"/>
<line x1="70.0" y1="400.0" x2="860.0" y2="400.0" class="axis"/>
</svg>